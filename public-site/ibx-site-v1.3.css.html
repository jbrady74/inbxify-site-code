<!-- INBXIFY Public Site CSS — v1.3 -->
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;0,900;1,400&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ibx-blue:#5b7fff;--ibx-blue-dark:#4a6ae5;--ibx-blue-light:#eef2ff;
  --ibx-teal:#1a3a3a;--ibx-teal-light:#244a4a;
  --ibx-gold:#C4A35A;--ibx-gold-light:#f4a127;
  --ibx-cream:#faf8f1;--ibx-cream-dark:#f5f3ef;
  --ibx-white:#ffffff;
  --ibx-text:#1a3a3a;--ibx-text-mid:#4a5a4a;--ibx-text-light:#7a8a7a;--ibx-text-tiny:#9a9a8a;
  --ibx-border:#e5e0d0;--ibx-border-light:#f0ece0;
  --ibx-green:#2d8a5e;--ibx-red:#c0392b;
  --ibx-serif:'Fraunces',Georgia,serif;
  --ibx-sans:'DM Sans',system-ui,-apple-system,sans-serif;
  --ibx-mono:'DM Mono','SF Mono',monospace;
}

/* WEBFLOW OVERRIDES — kill container constraints */
#ibx-page{max-width:none!important;padding:0!important;margin:0!important;width:100%!important;overflow:visible!important}
.ibx-site{font-family:var(--ibx-sans)!important;color:var(--ibx-text)!important;line-height:1.6!important;-webkit-font-smoothing:antialiased;background:var(--ibx-white)!important}
.ibx-site *,.ibx-site *::before,.ibx-site *::after{box-sizing:border-box!important}
.ibx-site a{color:inherit!important;text-decoration:none!important}
.ibx-site h1,.ibx-site h2,.ibx-site h3{font-family:var(--ibx-serif)!important;text-transform:none!important;letter-spacing:normal!important;margin:0!important;padding:0!important}
.ibx-site p{font-family:var(--ibx-sans)!important;margin:0!important;padding:0!important}

/* NAV */
.ibx-nav{position:sticky!important;top:0!important;z-index:100!important;background:rgba(250,248,241,0.92)!important;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--ibx-border)!important;width:100%!important;padding:0!important;margin:0!important}
.ibx-nav-inner{max-width:100%!important;margin:0!important;padding:0 32px!important;height:72px!important;display:flex!important;align-items:center!important;justify-content:space-between!important}
.ibx-nav-logo{display:flex!important;align-items:center!important;gap:10px!important;font-family:var(--ibx-serif)!important;font-weight:900!important;font-size:22px!important;color:var(--ibx-teal)!important;letter-spacing:-0.02em!important;text-decoration:none!important}
.ibx-nav-logo .ibx-hex{color:var(--ibx-blue)!important;font-size:26px!important}
.ibx-nav-links{display:flex!important;align-items:center!important;gap:6px!important}
.ibx-nav-link{font-family:var(--ibx-sans)!important;font-size:13px!important;font-weight:500!important;color:var(--ibx-text-mid)!important;padding:8px 12px!important;border-radius:8px!important;transition:all 0.2s!important;text-decoration:none!important;text-transform:none!important;letter-spacing:-0.01em!important}
.ibx-nav-link:hover{color:var(--ibx-teal)!important;background:rgba(26,58,58,0.04)!important}
.ibx-nav-link.ibx-active{color:var(--ibx-teal)!important;font-weight:600!important}
.ibx-nav-cta{font-family:var(--ibx-sans)!important;font-size:13px!important;font-weight:700!important;color:#ffffff!important;background:var(--ibx-blue)!important;padding:10px 22px!important;border-radius:8px!important;transition:all 0.2s!important;margin-left:8px!important;text-decoration:none!important}
.ibx-nav-cta:hover{background:var(--ibx-blue-dark)!important;transform:translateY(-1px);box-shadow:0 4px 16px rgba(91,127,255,0.25)}

/* SHARED LAYOUT */
.ibx-section{padding:80px 32px!important;margin:0!important;width:100%!important}
.ibx-inner{max-width:1200px!important;margin:0 auto!important;padding:0!important}
.ibx-label{font-family:var(--ibx-mono)!important;font-size:11px!important;font-weight:500!important;letter-spacing:0.12em!important;text-transform:uppercase!important;color:var(--ibx-blue)!important;margin-bottom:12px!important;display:flex!important;align-items:center!important;gap:8px!important}
.ibx-label::before{content:''!important;width:24px!important;height:2px!important;background:var(--ibx-blue)!important;border-radius:1px!important;display:block!important}
.ibx-h2{font-family:var(--ibx-serif)!important;font-size:36px!important;font-weight:700!important;line-height:1.15!important;color:var(--ibx-teal)!important;margin-bottom:48px!important;max-width:600px!important;letter-spacing:-0.01em!important;text-transform:none!important}
.ibx-btn{display:inline-flex!important;align-items:center!important;gap:8px!important;font-family:var(--ibx-sans)!important;font-size:15px!important;font-weight:700!important;color:var(--ibx-white)!important;background:var(--ibx-blue)!important;padding:14px 28px!important;border-radius:10px!important;border:none!important;cursor:pointer!important;transition:all 0.2s!important;text-decoration:none!important;text-transform:none!important}
.ibx-btn:hover{background:var(--ibx-blue-dark)!important;transform:translateY(-1px);box-shadow:0 6px 24px rgba(91,127,255,0.3)}
.ibx-btn-ghost{display:inline-flex!important;align-items:center!important;font-family:var(--ibx-sans)!important;font-size:15px!important;font-weight:600!important;color:var(--ibx-teal)!important;background:transparent!important;padding:14px 28px!important;border-radius:10px!important;border:2px solid var(--ibx-border)!important;cursor:pointer!important;transition:all 0.2s!important;text-decoration:none!important;text-transform:none!important}
.ibx-btn-ghost:hover{border-color:var(--ibx-teal)!important;background:rgba(26,58,58,0.03)!important}
.ibx-btn-white{display:inline-flex!important;align-items:center!important;font-family:var(--ibx-sans)!important;font-size:15px!important;font-weight:700!important;color:var(--ibx-teal)!important;background:var(--ibx-white)!important;padding:16px 32px!important;border-radius:10px!important;border:none!important;cursor:pointer!important;transition:all 0.2s!important;text-decoration:none!important;text-transform:none!important}
.ibx-btn-white:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,255,255,0.15)}

/* IMAGE PLACEHOLDER */
.ibx-img-ph{background:linear-gradient(135deg,#d8d2c4 0%,#c8c2b4 100%)!important;border-radius:14px!important;display:flex!important;flex-direction:column!important;align-items:center!important;justify-content:center!important;text-align:center!important;font-family:var(--ibx-mono)!important;font-size:10px!important;color:var(--ibx-text-light)!important;padding:24px!important;line-height:1.6!important;border:2px dashed var(--ibx-border)!important;position:relative!important;overflow:hidden!important}
.ibx-img-ph strong{display:block!important;font-size:11px!important;color:var(--ibx-text-mid)!important;margin-bottom:4px!important}

/* HERO */
.ibx-hero{background:var(--ibx-cream)!important;padding:80px 32px 64px!important;overflow:hidden!important;position:relative!important;width:100%!important;margin:0!important}
.ibx-hero::before{content:''!important;position:absolute!important;top:-200px!important;right:-200px!important;width:600px!important;height:600px!important;background:radial-gradient(circle,rgba(91,127,255,0.06) 0%,transparent 70%)!important;pointer-events:none!important}
.ibx-hero-inner{max-width:1200px!important;margin:0 auto!important;display:grid!important;grid-template-columns:1fr 1fr!important;gap:64px!important;align-items:center!important}
.ibx-hero h1{font-family:var(--ibx-serif)!important;font-size:48px!important;font-weight:900!important;line-height:1.1!important;color:var(--ibx-teal)!important;margin-bottom:24px!important;letter-spacing:-0.02em!important;text-transform:none!important}
.ibx-hero h1 em{font-style:normal!important;color:var(--ibx-blue)!important}
.ibx-hero-sub{font-family:var(--ibx-sans)!important;font-size:17px!important;line-height:1.7!important;color:var(--ibx-text-mid)!important;margin-bottom:32px!important;max-width:500px!important}
.ibx-hero-ctas{display:flex!important;gap:12px!important;align-items:center!important}
.ibx-hero-visual{display:flex!important;flex-direction:column!important;gap:16px!important}

/* UI CARD */
.ibx-ui-card{background:var(--ibx-white)!important;border:1.5px solid var(--ibx-border)!important;border-radius:12px!important;overflow:hidden!important;box-shadow:0 4px 20px rgba(26,58,58,0.06)!important}
.ibx-ui-bar{height:4px!important;background:linear-gradient(90deg,var(--ibx-blue),var(--ibx-gold))!important}
.ibx-ui-body{padding:16px 20px!important}
.ibx-ui-label{font-family:var(--ibx-mono)!important;font-size:9px!important;letter-spacing:0.08em!important;text-transform:uppercase!important;color:var(--ibx-blue)!important;margin-bottom:4px!important}
.ibx-ui-title{font-family:var(--ibx-serif)!important;font-size:15px!important;font-weight:700!important;color:var(--ibx-teal)!important;margin-bottom:10px!important;text-transform:none!important}
.ibx-ui-row{display:flex!important;justify-content:space-between!important;padding:6px 0!important;border-bottom:1px solid var(--ibx-border-light)!important;font-size:13px!important;font-family:var(--ibx-sans)!important}
.ibx-ui-row:last-child{border-bottom:none!important}
.ibx-ui-row span:first-child{color:var(--ibx-text-mid)!important}
.ibx-ui-row-val{font-family:var(--ibx-mono)!important;font-weight:600!important;color:var(--ibx-green)!important}
.ibx-ui-total{border-top:2px solid var(--ibx-teal)!important;padding-top:8px!important;margin-top:4px!important}
.ibx-ui-total span:first-child{font-weight:700!important;color:var(--ibx-teal)!important}
.ibx-ui-total .ibx-ui-row-val{color:var(--ibx-teal)!important;font-size:15px!important}

/* PHOTO OVERLAY */
.ibx-photo-overlay{position:absolute!important;bottom:0!important;left:0!important;right:0!important;padding:16px 20px!important;background:linear-gradient(transparent,rgba(26,58,58,0.88))!important;border-radius:0 0 14px 14px!important}
.ibx-photo-overlay-title{font-family:var(--ibx-serif)!important;font-size:14px!important;font-weight:700!important;color:#fff!important;text-transform:none!important}
.ibx-photo-overlay-sub{font-family:var(--ibx-mono)!important;font-size:10px!important;color:rgba(255,255,255,0.6)!important;margin-top:2px!important}

/* TRUST BAR */
.ibx-trust{background:var(--ibx-white)!important;border-bottom:1px solid var(--ibx-border-light)!important;padding:24px 32px!important;width:100%!important}
.ibx-trust-inner{max-width:1200px!important;margin:0 auto!important;display:flex!important;align-items:center!important;justify-content:center!important;gap:48px!important}
.ibx-trust-text{font-family:var(--ibx-mono)!important;font-size:11px!important;color:var(--ibx-text-tiny)!important;letter-spacing:0.06em!important;text-transform:uppercase!important}
.ibx-trust-logos{display:flex!important;align-items:center!important;gap:32px!important;opacity:0.3!important}
.ibx-trust-logo{font-family:var(--ibx-serif)!important;font-size:16px!important;font-weight:700!important;color:var(--ibx-teal)!important}

/* PILLARS */
.ibx-pillars{display:grid!important;grid-template-columns:repeat(3,1fr)!important;gap:24px!important}
.ibx-pillar{padding:32px!important;border-radius:14px!important;background:var(--ibx-cream)!important;border:1px solid var(--ibx-border-light)!important;transition:all 0.3s!important}
.ibx-pillar:hover{border-color:var(--ibx-border)!important;box-shadow:0 8px 32px rgba(26,58,58,0.06)!important;transform:translateY(-2px)}
.ibx-pillar-icon{width:48px!important;height:48px!important;border-radius:12px!important;display:flex!important;align-items:center!important;justify-content:center!important;margin-bottom:18px!important}
.ibx-pillar-icon svg{width:24px!important;height:24px!important}
.ibx-pillar h3{font-family:var(--ibx-serif)!important;font-size:20px!important;font-weight:700!important;color:var(--ibx-teal)!important;margin-bottom:8px!important;text-transform:none!important}
.ibx-pillar p{font-family:var(--ibx-sans)!important;font-size:14px!important;line-height:1.65!important;color:var(--ibx-text-mid)!important}

/* STATS */
.ibx-stats{background:var(--ibx-teal)!important;padding:48px 32px!important;position:relative!important;overflow:hidden!important;width:100%!important;margin:0!important}
.ibx-stats::before{content:'\2B21'!important;position:absolute!important;top:-30px!important;right:60px!important;font-size:200px!important;color:rgba(255,255,255,0.02)!important;pointer-events:none!important}
.ibx-stats-inner{max-width:1200px!important;margin:0 auto!important;display:grid!important;grid-template-columns:repeat(4,1fr)!important;gap:32px!important;text-align:center!important}
.ibx-stat-num{font-family:var(--ibx-serif)!important;font-size:44px!important;font-weight:900!important;color:var(--ibx-gold)!important;line-height:1!important;text-transform:none!important}
.ibx-stat-label{font-family:var(--ibx-mono)!important;font-size:11px!important;color:rgba(255,255,255,0.45)!important;text-transform:uppercase!important;letter-spacing:0.08em!important;margin-top:8px!important}

/* STEPS */
.ibx-steps{display:grid!important;grid-template-columns:repeat(4,1fr)!important;gap:24px!important}
.ibx-step{background:var(--ibx-white)!important;border-radius:14px!important;padding:28px!important;border:1px solid var(--ibx-border-light)!important;transition:all 0.3s!important}
.ibx-step:hover{border-color:var(--ibx-border)!important;box-shadow:0 4px 20px rgba(26,58,58,0.05)!important}
.ibx-step-num{font-family:var(--ibx-serif)!important;font-size:40px!important;font-weight:900!important;color:var(--ibx-blue)!important;line-height:1!important;margin-bottom:12px!important;opacity:0.8!important;text-transform:none!important}
.ibx-step h3{font-family:var(--ibx-serif)!important;font-size:17px!important;font-weight:700!important;color:var(--ibx-teal)!important;margin-bottom:8px!important;text-transform:none!important}
.ibx-step p{font-family:var(--ibx-sans)!important;font-size:13px!important;line-height:1.6!important;color:var(--ibx-text-mid)!important}

/* PROOF */
.ibx-proof-grid{display:grid!important;grid-template-columns:1fr!important;gap:16px!important}
.ibx-proof-sub{display:grid!important;grid-template-columns:1fr 1fr!important;gap:16px!important}

/* TESTIMONIAL */
.ibx-testimonial{max-width:800px!important;margin:0 auto!important;display:flex!important;align-items:center!important;gap:40px!important}
.ibx-testimonial-photo{width:100px!important;height:100px!important;border-radius:50%!important;background:linear-gradient(135deg,#d0ccc0,#c0bca8)!important;flex-shrink:0!important;display:flex!important;align-items:center!important;justify-content:center!important;box-shadow:0 4px 20px rgba(26,58,58,0.08)!important}
.ibx-testimonial-photo span{font-family:var(--ibx-mono)!important;font-size:8px!important;color:var(--ibx-text-light)!important;text-transform:uppercase!important;text-align:center!important;line-height:1.4!important}
.ibx-quote{font-family:var(--ibx-serif)!important;font-size:22px!important;font-weight:400!important;font-style:italic!important;color:var(--ibx-teal)!important;line-height:1.5!important;margin-bottom:16px!important;padding-left:24px!important;position:relative!important;text-transform:none!important}
.ibx-quote::before{content:''!important;position:absolute!important;left:0!important;top:4px!important;bottom:4px!important;width:3px!important;background:var(--ibx-gold)!important;border-radius:2px!important;display:block!important}
.ibx-attr-name{font-family:var(--ibx-sans)!important;font-size:15px!important;font-weight:700!important;color:var(--ibx-teal)!important;padding-left:24px!important}
.ibx-attr-role{font-family:var(--ibx-sans)!important;font-size:13px!important;color:var(--ibx-text-light)!important;padding-left:24px!important}

/* CTA BAND */
.ibx-cta{background:var(--ibx-teal)!important;padding:80px 32px!important;text-align:center!important;position:relative!important;overflow:hidden!important;width:100%!important;margin:0!important}
.ibx-cta::before{content:''!important;position:absolute!important;bottom:-100px!important;left:50%!important;transform:translateX(-50%)!important;width:500px!important;height:500px!important;background:radial-gradient(circle,rgba(91,127,255,0.08) 0%,transparent 70%)!important;pointer-events:none!important}
.ibx-cta-inner{max-width:600px!important;margin:0 auto!important;position:relative!important;z-index:1!important}
.ibx-cta h2{font-family:var(--ibx-serif)!important;font-size:32px!important;font-weight:700!important;color:#fff!important;line-height:1.2!important;margin-bottom:12px!important;text-transform:none!important}
.ibx-cta p{font-family:var(--ibx-sans)!important;font-size:16px!important;color:rgba(255,255,255,0.55)!important;line-height:1.6!important;margin-bottom:28px!important}

/* PAGE HERO */
.ibx-page-hero{background:var(--ibx-cream)!important;padding:80px 32px 56px!important;position:relative!important;overflow:hidden!important;width:100%!important;margin:0!important}
.ibx-page-hero::before{content:''!important;position:absolute!important;top:-200px!important;right:-200px!important;width:600px!important;height:600px!important;background:radial-gradient(circle,rgba(91,127,255,0.05) 0%,transparent 70%)!important;pointer-events:none!important}
.ibx-page-hero h1{font-family:var(--ibx-serif)!important;font-size:42px!important;font-weight:900!important;line-height:1.12!important;color:var(--ibx-teal)!important;margin-bottom:16px!important;max-width:700px!important;letter-spacing:-0.02em!important;text-transform:none!important}
.ibx-page-hero p{font-family:var(--ibx-sans)!important;font-size:17px!important;line-height:1.7!important;color:var(--ibx-text-mid)!important;max-width:560px!important}

/* HOW IT WORKS */
.ibx-hiw-step{display:flex!important;gap:32px!important;align-items:flex-start!important;padding:32px 0!important;border-bottom:1px solid var(--ibx-border-light)!important}
.ibx-hiw-step:last-child{border-bottom:none!important}
.ibx-hiw-num{font-family:var(--ibx-serif)!important;font-size:56px!important;font-weight:900!important;color:var(--ibx-blue)!important;line-height:1!important;flex-shrink:0!important;width:80px!important;opacity:0.7!important;text-transform:none!important}
.ibx-hiw-body h3{font-family:var(--ibx-serif)!important;font-size:22px!important;font-weight:700!important;color:var(--ibx-teal)!important;margin-bottom:8px!important;text-transform:none!important}
.ibx-hiw-body p{font-family:var(--ibx-sans)!important;font-size:15px!important;line-height:1.7!important;color:var(--ibx-text-mid)!important;max-width:560px!important}
.ibx-eng-grid{display:grid!important;grid-template-columns:1fr 1fr!important;gap:24px!important}
.ibx-eng-card{background:var(--ibx-white)!important;border-radius:14px!important;padding:32px!important;border:1px solid var(--ibx-border-light)!important}
.ibx-eng-phase{display:inline-block!important;font-family:var(--ibx-mono)!important;font-size:10px!important;font-weight:600!important;letter-spacing:0.08em!important;text-transform:uppercase!important;padding:4px 12px!important;border-radius:6px!important;margin-bottom:14px!important}
.ibx-eng-card h3{font-family:var(--ibx-serif)!important;font-size:22px!important;font-weight:700!important;color:var(--ibx-teal)!important;margin-bottom:4px!important;text-transform:none!important}
.ibx-eng-duration{font-family:var(--ibx-mono)!important;font-size:13px!important;font-weight:600!important;color:var(--ibx-blue)!important;margin-bottom:14px!important}
.ibx-eng-card p{font-family:var(--ibx-sans)!important;font-size:14px!important;line-height:1.65!important;color:var(--ibx-text-mid)!important}
.ibx-includes{display:grid!important;grid-template-columns:repeat(3,1fr)!important;gap:20px!important}
.ibx-include{padding:24px!important;background:var(--ibx-cream)!important;border-radius:12px!important;border:1px solid var(--ibx-border-light)!important}
.ibx-include-icon{font-size:28px!important;margin-bottom:10px!important}
.ibx-include h3{font-family:var(--ibx-serif)!important;font-size:17px!important;font-weight:700!important;color:var(--ibx-teal)!important;margin-bottom:6px!important;text-transform:none!important}
.ibx-include p{font-family:var(--ibx-sans)!important;font-size:13px!important;line-height:1.6!important;color:var(--ibx-text-mid)!important}

/* PUBLISHERS */
.ibx-reality{font-family:var(--ibx-sans)!important;font-size:17px!important;line-height:1.8!important;color:var(--ibx-text-mid)!important;max-width:640px!important;margin-bottom:20px!important}
.ibx-fear{padding:28px!important;background:var(--ibx-white)!important;border-radius:12px!important;border:1px solid var(--ibx-border-light)!important;border-left:4px solid var(--ibx-blue)!important;margin-bottom:16px!important}
.ibx-fear-q{font-family:var(--ibx-serif)!important;font-size:18px!important;font-weight:700!important;font-style:italic!important;color:var(--ibx-teal)!important;margin-bottom:10px!important;text-transform:none!important}
.ibx-fear-a{font-family:var(--ibx-sans)!important;font-size:15px!important;line-height:1.65!important;color:var(--ibx-text-mid)!important}
.ibx-compare{display:grid!important;grid-template-columns:1fr 1fr!important;border-radius:14px!important;overflow:hidden!important;border:1px solid var(--ibx-border)!important}
.ibx-compare-col{background:var(--ibx-cream)!important}
.ibx-compare-col.ibx-hl{background:var(--ibx-white)!important}
.ibx-compare-hdr{font-family:var(--ibx-serif)!important;font-size:15px!important;font-weight:700!important;padding:16px 24px!important;background:var(--ibx-border)!important;color:var(--ibx-teal)!important;text-transform:none!important}
.ibx-compare-col.ibx-hl .ibx-compare-hdr{background:var(--ibx-teal)!important;color:var(--ibx-gold)!important}
